name: AETHER-DFT CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    env:
      PYTHONUTF8: '1'
      PYTHONIOENCODING: utf-8
      PYTHONNOUSERSITE: '1'
      AETHER_DFT_CI: '1'
      DEEPSEEK_API_KEY: ci-placeholder-not-used
      DASHSCOPE_API_KEY: ci-placeholder-not-used

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        shell: pwsh
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Launcher and doctor smoke
        shell: pwsh
        run: |
          $env:AETHER_LAUNCHER_SELFTEST = "1"
          .\aether.cmd
          Remove-Item Env:\AETHER_LAUNCHER_SELFTEST
          python -m aether_dft.cli doctor --json

      - name: Compile sources
        shell: pwsh
        run: |
          python -m compileall -q aether_dft dft_app dft_shared scripts tests

      - name: Lint
        shell: pwsh
        run: |
          python -m ruff check aether_dft dft_app scripts tests

      - name: Core tests
        shell: pwsh
        run: |
          python -m pytest -q `
            tests/test_aether_cli_harness.py `
            tests/test_aether_llm_runtime.py `
            tests/test_aether_cluster_realtime.py `
            tests/test_aether_cluster_agent_tools.py `
            tests/test_harness_architecture.py `
            tests/test_aether_auto_mode.py `
            tests/test_aether_tool_discovery.py `
            tests/test_aether_research_continuity.py `
            tests/test_aether_guided_flow_completion.py `
            tests/test_aether_fast_path.py `
            tests/test_aether_session_tools.py
